name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install lxml
      - name: Lint all packs
        run: python scripts/packlint.py --all

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create the draft release on tags
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install lxml
      - name: Build all packs (deterministic) and validate they install
        run: python scripts/packbuild.py --all --out-dir dist --validate

      - name: Create draft release and upload packs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*.l5rcmpack
